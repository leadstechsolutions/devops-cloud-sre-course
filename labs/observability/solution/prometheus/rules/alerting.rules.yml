# Alerting rules: multi-window, multi-burn-rate SLO alerts for the `checkout` service.
#
# Validate with: promtool check rules prometheus/rules/alerting.rules.yml
# Test  with:    promtool test rules tests/alerting_test.yaml   (runs in validate.sh)
#
# SLO: 99.9% of requests succeed over 30 days  =>  error budget = 0.1% = 0.001.
# Source: Google SRE Workbook, "Alerting on SLOs" (multiwindow, multi-burn-rate).
#
# A "burn rate" is how fast you are spending the error budget relative to the rate that
# would exhaust it exactly at the end of the window. Burn rate 1 = on track to use 100%
# of the budget in 30 days. Burn rate 14.4 = on track to use 100% in ~2 days.
#
# The thresholds below come straight from the Workbook's recommended table for a 30-day
# window. The error-budget consumed by the time the alert fires is:
#     budget_consumed = burn_rate * (long_window / 30d)
#
#   Severity   Long window  Short window  Burn rate  Budget consumed when it fires
#   ---------  -----------  ------------  ---------  -----------------------------
#   page       1h           5m           14.4       2%   (fast burn — wake someone)
#   ticket     6h           30m          6          5%   (slow burn — fix this week)
#
# WHY TWO WINDOWS PER ALERT: the LONG window gives significance (you have really been
# burning budget for a meaningful period, not a 1-minute blip). The SHORT window gives
# fast reset / low detection time (when the incident ends, the short window clears the
# alert quickly instead of staying lit for the full long window). BOTH must exceed the
# burn-rate threshold for the alert to fire — that is the `and` below.
#
# The error_ratio:rateXX series are precomputed in recording.rules.yml, so the alert and
# the dashboards share one definition of "error".

groups:
  - name: checkout-slo-burn-rate
    rules:
      # ============================ FAST BURN (page) ============================
      # Fires when, over the last 1h AND the last 5m, the error ratio exceeds
      # 14.4 * 0.001 = 0.0144. At 14.4x you would exhaust a 30-day budget in ~50h,
      # and you have already burned ~2% by the time this fires. This pages on-call.
      - alert: CheckoutErrorBudgetBurnFast
        expr: |
          (
            job:http_requests_error_ratio:rate1h{job="checkout"} > (14.4 * 0.001)
            and
            job:http_requests_error_ratio:rate5m{job="checkout"} > (14.4 * 0.001)
          )
        for: 2m
        labels:
          severity: page
          service: checkout
          slo: availability
          burn_rate: "14.4"
        annotations:
          summary: "checkout is burning its error budget FAST (14.4x)"
          description: >-
            Over the last 1h and 5m the checkout 5xx error ratio is
            {{ $value | humanizePercentage }}, above the 1.44% fast-burn threshold
            (14.4x the 99.9% SLO budget). At this rate the 30-day error budget is
            consumed in ~2 days. Page on-call and start incident response.
          runbook_url: "https://runbooks.example.com/checkout/error-budget-burn"
          dashboard_url: "https://grafana.example.com/d/checkout-overview"

      # ============================ SLOW BURN (ticket) =========================
      # Fires when, over the last 6h AND the last 30m, the error ratio exceeds
      # 6 * 0.001 = 0.006. A 6x burn exhausts the budget in ~5 days; ~5% is gone by
      # the time it fires. This is a ticket, not a page — fix it within the week.
      - alert: CheckoutErrorBudgetBurnSlow
        expr: |
          (
            job:http_requests_error_ratio:rate6h{job="checkout"} > (6 * 0.001)
            and
            job:http_requests_error_ratio:rate30m{job="checkout"} > (6 * 0.001)
          )
        for: 15m
        labels:
          severity: ticket
          service: checkout
          slo: availability
          burn_rate: "6"
        annotations:
          summary: "checkout is burning its error budget slowly (6x)"
          description: >-
            Over the last 6h and 30m the checkout 5xx error ratio is
            {{ $value | humanizePercentage }}, above the 0.6% slow-burn threshold
            (6x the 99.9% SLO budget). At this rate the 30-day error budget is
            consumed in ~5 days. Open a ticket and fix this within the week.
          runbook_url: "https://runbooks.example.com/checkout/error-budget-burn"
          dashboard_url: "https://grafana.example.com/d/checkout-overview"

  # A plain latency SLO alert, included so learners see a non-burn-rate alert too.
  - name: checkout-latency
    rules:
      - alert: CheckoutHighLatencyP99
        expr: job:http_request_duration_seconds:p99{job="checkout"} > 0.5
        for: 10m
        labels:
          severity: ticket
          service: checkout
          slo: latency
        annotations:
          summary: "checkout p99 latency above 500ms"
          description: >-
            p99 request latency for checkout is {{ $value | humanizeDuration }}
            (threshold 500ms) over the last 10 minutes.
          runbook_url: "https://runbooks.example.com/checkout/high-latency"
