# STARTER plain-manifest Deployment for __SERVICE_NAME__.
# TODO: add securityContext (pod + container), probes, resources, and a
# writable /tmp emptyDir so this matches the chart's posture. See solution/.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: __SERVICE_NAME__
  labels:
    app.kubernetes.io/name: __SERVICE_NAME__
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: __SERVICE_NAME__
  template:
    metadata:
      labels:
        app.kubernetes.io/name: __SERVICE_NAME__
    spec:
      containers:
        - name: __SERVICE_NAME__
          image: ghcr.io/example/__SERVICE_NAME__:1.0.0
          ports:
            - name: http
              containerPort: 8080
