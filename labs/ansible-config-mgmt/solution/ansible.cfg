# Ansible configuration for the config-mgmt lab.
# Project-local config: Ansible reads ./ansible.cfg when you run from this dir.
# Keep it minimal and explicit — no surprises, no implicit privilege escalation.
[defaults]
inventory            = inventory.ini
roles_path           = roles
host_key_checking    = True
retry_files_enabled  = False
stdout_callback      = yaml
interpreter_python   = auto_silent
# Fail fast: any unreachable host or failed task aborts the run.
any_errors_fatal     = True
# Show task timing so learners can see what is slow.
callbacks_enabled    = ansible.posix.profile_tasks

[privilege_escalation]
# Become root only when a task asks for it (become: true), via sudo.
become        = False
become_method = sudo
become_user   = root
become_ask_pass = False

[ssh_connection]
# Speed: reuse SSH connections (ControlMaster) and pipeline module transfer.
pipelining   = True
ssh_args     = -o ControlMaster=auto -o ControlPersist=60s -o PreferredAuthentications=publickey
