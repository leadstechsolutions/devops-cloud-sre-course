---
# hardening: lock down SSH and the host firewall.
#   - sshd: disable root login, disable password auth, tune session limits
#   - ufw: default deny inbound, allow only 22/80/443
#
# Every sshd change is validated with `sshd -t` BEFORE the service is reloaded
# (validate: on the lineinfile task) so a bad edit can never lock you out by
# breaking the daemon. The firewall allows SSH (22) FIRST, before enabling the
# default-deny policy, for the same reason.

# --- SSH daemon hardening ---------------------------------------------------
- name: Disable root login over SSH
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?\s*PermitRootLogin'
    line: "PermitRootLogin {{ ssh_permit_root_login }}"
    state: present
    validate: "/usr/sbin/sshd -t -f %s"
  notify: Restart sshd

- name: Disable SSH password authentication
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?\s*PasswordAuthentication'
    line: "PasswordAuthentication {{ ssh_password_authentication }}"
    state: present
    validate: "/usr/sbin/sshd -t -f %s"
  notify: Restart sshd

- name: Enable SSH public-key authentication
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?\s*PubkeyAuthentication'
    line: "PubkeyAuthentication {{ ssh_pubkey_authentication }}"
    state: present
    validate: "/usr/sbin/sshd -t -f %s"
  notify: Restart sshd

- name: Limit SSH authentication attempts
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?\s*MaxAuthTries'
    line: "MaxAuthTries {{ ssh_max_auth_tries }}"
    state: present
    validate: "/usr/sbin/sshd -t -f %s"
  notify: Restart sshd

- name: Set SSH idle-session timeout (ClientAliveInterval)
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?\s*ClientAliveInterval'
    line: "ClientAliveInterval {{ ssh_client_alive_interval }}"
    state: present
    validate: "/usr/sbin/sshd -t -f %s"
  notify: Restart sshd

- name: Set SSH idle-session count (ClientAliveCountMax)
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?\s*ClientAliveCountMax'
    line: "ClientAliveCountMax {{ ssh_client_alive_count_max }}"
    state: present
    validate: "/usr/sbin/sshd -t -f %s"
  notify: Restart sshd

# --- Host firewall (ufw) ----------------------------------------------------
- name: Ensure ufw is installed
  ansible.builtin.package:
    name: ufw
    state: present

# Open the allowed ports BEFORE switching the default policy to deny, so we
# never drop our own SSH session mid-play.
- name: Allow inbound ports (22/80/443)
  community.general.ufw:
    rule: allow
    port: "{{ item.port }}"
    proto: "{{ item.proto }}"
    comment: "{{ item.comment }}"
  loop: "{{ ufw_allowed_ports }}"
  loop_control:
    label: "{{ item.port }}/{{ item.proto }} ({{ item.comment }})"

- name: Default deny inbound, allow outbound
  community.general.ufw:
    direction: "{{ item.direction }}"
    policy: "{{ item.policy }}"
  loop:
    - { direction: "incoming", policy: "deny" }
    - { direction: "outgoing", policy: "allow" }
  loop_control:
    label: "{{ item.direction }} -> {{ item.policy }}"

- name: Enable ufw and turn on logging
  community.general.ufw:
    state: enabled
    logging: "on"
