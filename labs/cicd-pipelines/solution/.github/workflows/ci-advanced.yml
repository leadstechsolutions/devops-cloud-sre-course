name: ci-advanced

# ADVANCED VARIANT (Week 19 depth) — NOT the Week 9 lecture pipeline.
# The Week 9 primary pipeline is ci.yml (ruff -> pytest -> tarball artifact +
# gitleaks/pip-audit gate). This file goes a layer deeper into the SUPPLY CHAIN:
# it builds the container IMAGE and runs a Trivy image scan as the hard gate,
# the way a production team scans the artifact that actually ships.
#
# Run on every PR into main and on direct pushes to main.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Least privilege at the top: by default jobs get read-only access to the repo.
# Individual jobs that need more (e.g. writing the SARIF security report) opt in.
permissions:
  contents: read

# Cancel superseded runs on the same ref so a force-push doesn't burn minutes
# finishing a stale pipeline. group is per-workflow-per-ref.
concurrency:
  group: ci-advanced-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: app

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # ruff is a fast Python linter; the official action installs and runs it.
      - name: Lint Python (ruff)
        uses: astral-sh/ruff-action@v3
        with:
          src: app
      # hadolint lints the Dockerfile. Pinned action, fails on its default rules.
      - name: Lint Dockerfile (hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: app/Dockerfile

  test:
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install --no-cache-dir -r ../requirements-dev.txt
      - name: Run tests
        working-directory: ${{ github.workspace }}
        run: python -m pytest -q

  build:
    runs-on: ubuntu-latest
    needs: [test]
    # Output the locally-built image ref so the scan job consumes exactly what we built.
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Set image ref
        id: meta
        run: echo "image=ci-local/app:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
      # Build but do not push from PR CI. Load into the local docker daemon so the
      # scan job can analyse the real image (not just the Dockerfile).
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: app
          file: app/Dockerfile
          push: false
          load: true
          tags: ${{ steps.meta.outputs.image }}

  scan:
    runs-on: ubuntu-latest
    needs: [build]
    # This job needs to upload the SARIF report to the Security tab; that is the
    # only extra grant, scoped to this job only.
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Rebuild image for scan
        uses: docker/build-push-action@v6
        with:
          context: app
          file: app/Dockerfile
          push: false
          load: true
          tags: ${{ needs.build.outputs.image }}
      # THE GATE. exit-code: '1' makes Trivy return non-zero when it finds a
      # vulnerability at or above the severity list, which FAILS this job — and
      # because branch protection requires the `scan` check, it BLOCKS the merge.
      # This is a hard gate, NOT a soft warning (no `|| true`, no exit-code 0).
      - name: Scan image (Trivy) — fail on HIGH/CRITICAL
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ needs.build.outputs.image }}
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
      # Always upload the report (even on failure) so reviewers can see the CVEs.
      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: app/trivy-results.sarif
