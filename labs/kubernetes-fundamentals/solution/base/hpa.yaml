# Horizontal Pod Autoscaler: scale the Deployment between 2 and 6 replicas to
# keep average CPU utilisation near 70% of the *request* (50m). When the
# 2-replica fleet averages above 70% of its requested CPU, the HPA adds pods.
#
# Requires metrics-server in the cluster (kubectl top must work). Without it the
# HPA reports <unknown> for current utilisation and will not scale.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: web
  labels:
    app.kubernetes.io/name: web
    app.kubernetes.io/component: app
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: web
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleDown:
      # Don't thrash: wait 5 min of sustained low load before scaling in.
      stabilizationWindowSeconds: 300
    scaleUp:
      stabilizationWindowSeconds: 0
