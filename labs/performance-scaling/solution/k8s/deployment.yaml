# The workload under test: the CPU-burner. It exposes /burn, which pins a CPU
# thread for a controllable duration, giving the HorizontalPodAutoscaler a real,
# steerable load signal. Resource *requests* are deliberately small (100m CPU)
# so a modest amount of /burn traffic pushes average utilisation past the HPA
# target and forces a scale-out we can observe.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cpu-burner
  labels:
    app.kubernetes.io/name: cpu-burner
    app.kubernetes.io/component: app
spec:
  # Start at 1. The HPA owns the replica count from here on; we set 1 so the
  # demo can show 1 -> >1 scaling. (Don't fight the HPA: never hardcode a
  # replicas value the HPA also manages beyond the initial create.)
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cpu-burner
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cpu-burner
        app.kubernetes.io/component: app
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: cpu-burner
          # Built from solution/app/Dockerfile and side-loaded into kind
          # (`kind load docker-image`). Pinned tag, never :latest, so rollouts
          # and the demo are deterministic.
          image: cpu-burner:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: BURN_MS
              value: "50"
          # Probes hit /healthz, which is intentionally CHEAP. Pointing a probe
          # at /burn would make the pod look unhealthy precisely when it is busy
          # and trigger restart storms under load.
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 3
            failureThreshold: 10
          # The HPA target is a PERCENTAGE OF THE REQUEST. With request=100m and
          # an HPA target of 50%, the controller adds pods once average usage
          # crosses ~50m per pod. The limit (500m) lets a single pod actually
          # burn enough CPU to cross that line under load before scaling helps.
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            privileged: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 16Mi
