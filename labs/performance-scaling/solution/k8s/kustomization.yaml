# Bundles the lab's objects so `kubectl apply -k solution/k8s` brings up the
# whole stack (and `kubectl kustomize solution/k8s | kubeconform` validates the
# exact set of objects that will be applied). The Namespace is listed first;
# `namespace:` pins every other object into it.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: lab-perf

resources:
  - namespace.yaml
  - deployment.yaml
  - service.yaml
  - hpa.yaml

# Apply a shared label to every object's metadata. includeSelectors:false is
# deliberate: the Deployment's spec.selector is immutable after creation, so we
# must NOT fold this label into selectors (that would rewrite the selector and
# the pod-template match). `commonLabels` is deprecated; this is the replacement.
labels:
  - pairs:
      app.kubernetes.io/part-of: performance-scaling
    includeSelectors: false
