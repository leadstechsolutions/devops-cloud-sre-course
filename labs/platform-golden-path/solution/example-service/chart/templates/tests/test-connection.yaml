apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "service.fullname" . }}-test-connection"
  labels:
    {{- include "service.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  restartPolicy: Never
  securityContext:
    runAsNonRoot: true
    runAsUser: 10001
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: curl
      image: curlimages/curl:8.10.1
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop:
            - ALL
      command: ["curl"]
      args:
        - "--fail"
        - "--silent"
        - "http://{{ include "service.fullname" . }}:{{ .Values.service.port }}/healthz"
