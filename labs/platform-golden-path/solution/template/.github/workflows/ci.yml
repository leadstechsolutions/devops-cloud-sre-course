name: ci

# Paved-road CI for __SERVICE_NAME__: lint -> test -> build+scan. Every gate is
# a hard failure. Merges to main are blocked until all jobs are green.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install lint tooling
        run: pip install ruff==0.8.4
      - name: Ruff (lint + format check)
        run: |
          ruff check app tests
          ruff format --check app tests
      - name: Hadolint (Dockerfile)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile (fail fast on syntax errors)
        run: python -m compileall -q app
      - name: Unit tests
        run: python -m unittest discover -s tests -p 'test_*.py' -v

  helm:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.16.3
      - name: Helm lint
        run: helm lint chart
      - name: Helm template renders
        run: helm template __SERVICE_NAME__ chart > /tmp/rendered.yaml
      - name: Install kubeconform
        run: |
          curl -sSL -o /tmp/kc.tar.gz \
            https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
          tar -xzf /tmp/kc.tar.gz -C /tmp kubeconform
          sudo mv /tmp/kubeconform /usr/local/bin/
      - name: Validate rendered manifests
        run: helm template __SERVICE_NAME__ chart | kubeconform -strict -summary

  build-scan:
    runs-on: ubuntu-latest
    needs: [test, helm]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t __SERVICE_NAME__:ci .
      - name: Trivy image scan (fail on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: __SERVICE_NAME__:ci
          format: table
          exit-code: "1"
          severity: HIGH,CRITICAL
          ignore-unfixed: true
