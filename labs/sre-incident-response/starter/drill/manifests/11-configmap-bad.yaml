apiVersion: v1
kind: ConfigMap
metadata:
  name: payments-web-config-v2
  namespace: lab-incident
  labels:
    app: payments-web
    config-version: v2
data:
  # TODO(student): write the BAD nginx config that injects the fault.
  #
  # The deployment's readiness AND liveness probes both hit `/healthz`. To make
  # the readiness probe FAIL (so new pods never join the Service endpoints and
  # the service degrades), `/healthz` must return a NON-2xx status here.
  #
  # Requirements for this config to inject a clean incident:
  #   * server listens on 8080 (the container port the probe targets)
  #   * `location = /healthz` returns a 5xx (e.g. 503) -- this is the regression
  #   * the business endpoints (`/v1/authorize`, `/`) return 500 so a request
  #     that somehow reaches a bad pod also clearly fails
  #
  # See solution/drill/manifests/11-configmap-bad.yaml for the reference.
  default.conf: |
    server {
        listen 8080;
        server_name _;

        # TODO(student): make /healthz return 503 (currently 200 -> no fault).
        location = /healthz {
            add_header Content-Type text/plain;
            return 200 'TODO: make this 503 to inject the readiness fault\n';
        }

        # TODO(student): return 500 for the business endpoints below.
        location / {
            add_header Content-Type text/plain;
            return 200 'TODO\n';
        }
    }
