# Minimal Prometheus config for the capstone LOCAL DEMO only.
#
# This is intentionally small. The production-grade config — recording rules,
# multi-burn-rate SLO alerting, Alertmanager wiring, OTel collector scrape — lives
# in labs/observability/solution/prometheus/. This file exists so the
# `--profile metrics` demo shows metrics flowing without copying that whole stack.
#
# Validate:
#   promtool check config prometheus/prometheus.demo.yml
# (promtool ships with Prometheus; see README for the container one-liner.)

global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s
  external_labels:
    cluster: capstone-demo
    environment: demo

scrape_configs:
  # 1) Prometheus scrapes itself — proves the server is alive and exporting.
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # 2) The application. The capstone demo app (from labs/docker-containers) serves
  #    a JSON health endpoint, not an OpenMetrics /metrics page, so this target
  #    will show DOWN unless you run the app behind the observability module's
  #    instrumentation. It is declared here so the wiring is visible and so the
  #    /targets page documents the intended scrape. In production the app is
  #    instrumented per labs/observability (RED counters/histograms at /metrics).
  - job_name: capstone-app
    metrics_path: /metrics
    static_configs:
      - targets: ["app:8000"]
        labels:
          service: capstone-app
