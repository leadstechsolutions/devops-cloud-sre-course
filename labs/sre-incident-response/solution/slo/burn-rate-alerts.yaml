# Multi-window, multi-burn-rate alerting for the payments-api 99.9% availability SLO.
# Implements the Google SRE Workbook "Alerting on SLOs" recommendation:
#   https://sre.google/workbook/alerting-on-slos/
#
# Format: Prometheus rule groups (the de-facto runtime for OpenSLO ratio metrics).
# Validate with: promtool check rules slo/burn-rate-alerts.yaml   (DEFERRED — promtool
#   absent in this env; see README). Lighter local gate run here: YAML well-formedness.
#
# SLO: 99.9% success over 30d  =>  error budget = 0.1%  =>  budget burn at 1x exhausts
# the whole budget in exactly 30 days. The burn-rate thresholds below are the standard
# values for a 30-day budget; each pairs a long window (detection) with a short window
# (so the alert resolves quickly once the burn stops).
#
#   | Severity | Long burn / window | Short burn / window | Budget consumed at fire |
#   |----------|--------------------|---------------------|-------------------------|
#   | page     | 14.4x over 1h      | 14.4x over 5m       | ~2%  of 30d budget      |
#   | page     | 6x   over 6h       | 6x   over 30m       | ~5%  of 30d budget      |
#   | ticket   | 3x   over 1d       | 3x   over 2h        | ~10% of 30d budget      |
#   | ticket   | 1x   over 3d       | 1x   over 6h        | ~10% of 30d budget      |
#
# error_ratio = bad/total. Burn rate = error_ratio / (1 - target) = error_ratio / 0.001.
# So "burn rate > 14.4" == "error_ratio > 0.0144". We express the threshold directly on
# the recorded error ratio so the math is visible in the alert expression.
---
groups:
  # ---------------------------------------------------------------------------
  # Recording rules: the request error ratio at each window the alerts need.
  # Precomputing keeps the alert expressions cheap and identical in shape.
  # ---------------------------------------------------------------------------
  - name: payments-api-slo-error-ratios
    interval: 30s
    rules:
      - record: job:slo_errors_per_request:ratio_rate5m
        expr: |
          sum(rate(http_requests_total{job="payments-api", code=~"5.."}[5m]))
          /
          sum(rate(http_requests_total{job="payments-api"}[5m]))
      - record: job:slo_errors_per_request:ratio_rate30m
        expr: |
          sum(rate(http_requests_total{job="payments-api", code=~"5.."}[30m]))
          /
          sum(rate(http_requests_total{job="payments-api"}[30m]))
      - record: job:slo_errors_per_request:ratio_rate1h
        expr: |
          sum(rate(http_requests_total{job="payments-api", code=~"5.."}[1h]))
          /
          sum(rate(http_requests_total{job="payments-api"}[1h]))
      - record: job:slo_errors_per_request:ratio_rate2h
        expr: |
          sum(rate(http_requests_total{job="payments-api", code=~"5.."}[2h]))
          /
          sum(rate(http_requests_total{job="payments-api"}[2h]))
      - record: job:slo_errors_per_request:ratio_rate6h
        expr: |
          sum(rate(http_requests_total{job="payments-api", code=~"5.."}[6h]))
          /
          sum(rate(http_requests_total{job="payments-api"}[6h]))
      - record: job:slo_errors_per_request:ratio_rate1d
        expr: |
          sum(rate(http_requests_total{job="payments-api", code=~"5.."}[1d]))
          /
          sum(rate(http_requests_total{job="payments-api"}[1d]))
      - record: job:slo_errors_per_request:ratio_rate3d
        expr: |
          sum(rate(http_requests_total{job="payments-api", code=~"5.."}[3d]))
          /
          sum(rate(http_requests_total{job="payments-api"}[3d]))

  # ---------------------------------------------------------------------------
  # Alerting rules. Each fires only when BOTH the long and short windows exceed
  # the burn threshold, so the alert clears fast once errors subside.
  # 0.001 = (1 - 0.999) = the error budget fraction.
  # ---------------------------------------------------------------------------
  - name: payments-api-slo-burn-rate
    rules:
      - alert: PaymentsAPIErrorBudgetFastBurn
        expr: |
          job:slo_errors_per_request:ratio_rate1h > (14.4 * 0.001)
          and
          job:slo_errors_per_request:ratio_rate5m > (14.4 * 0.001)
        for: 2m
        labels:
          severity: page
          slo: payments-api-availability
          burn_rate: "14.4"
        annotations:
          summary: "payments-api burning error budget 14.4x (1h+5m)"
          description: >-
            At this rate ~2% of the 30-day error budget is gone and the budget will be
            exhausted in ~2 days. Page on-call: open an incident, see runbooks/high-error-rate.md.
          runbook_url: "runbooks/high-error-rate.md"

      - alert: PaymentsAPIErrorBudgetFastBurn
        expr: |
          job:slo_errors_per_request:ratio_rate6h > (6 * 0.001)
          and
          job:slo_errors_per_request:ratio_rate30m > (6 * 0.001)
        for: 5m
        labels:
          severity: page
          slo: payments-api-availability
          burn_rate: "6"
        annotations:
          summary: "payments-api burning error budget 6x (6h+30m)"
          description: >-
            ~5% of the 30-day budget consumed; budget exhausted in ~5 days at this rate.
            Page on-call. Runbook: runbooks/high-error-rate.md.
          runbook_url: "runbooks/high-error-rate.md"

      - alert: PaymentsAPIErrorBudgetSlowBurn
        expr: |
          job:slo_errors_per_request:ratio_rate1d > (3 * 0.001)
          and
          job:slo_errors_per_request:ratio_rate2h > (3 * 0.001)
        for: 15m
        labels:
          severity: ticket
          slo: payments-api-availability
          burn_rate: "3"
        annotations:
          summary: "payments-api slow error-budget burn 3x (1d+2h)"
          description: >-
            Sustained 3x burn. Not a page, but open a ticket and investigate within the
            business day. Runbook: runbooks/high-error-rate.md.
          runbook_url: "runbooks/high-error-rate.md"

      - alert: PaymentsAPIErrorBudgetSlowBurn
        expr: |
          job:slo_errors_per_request:ratio_rate3d > (1 * 0.001)
          and
          job:slo_errors_per_request:ratio_rate6h > (1 * 0.001)
        for: 1h
        labels:
          severity: ticket
          slo: payments-api-availability
          burn_rate: "1"
        annotations:
          summary: "payments-api slow error-budget burn 1x (3d+6h)"
          description: >-
            Low-grade error rate that will still exhaust the monthly budget if left
            unaddressed. Open a ticket. Runbook: runbooks/high-error-rate.md.
          runbook_url: "runbooks/high-error-rate.md"
