# =============================== FAKE SECRET ================================
# EXAMPLE ONLY. These values are intentionally fake placeholders so the lab is
# self-contained and applies cleanly. NEVER commit a real secret to git.
#
# In the real world you would NOT have this file in the repo at all. Instead:
#   * create the Secret out-of-band:
#       kubectl -n web create secret generic web-secret \
#         --from-literal=API_TOKEN=... --from-literal=DB_PASSWORD=...
#   * or use Sealed Secrets / External Secrets Operator / SOPS so only an
#     encrypted form is ever committed.
#
# `stringData` lets you write plaintext that Kubernetes base64-encodes for you
# (the stored `data` is base64, which is encoding, NOT encryption — etcd
# encryption-at-rest is what actually protects it on disk).
# ===========================================================================
apiVersion: v1
kind: Secret
metadata:
  name: web-secret
  labels:
    app.kubernetes.io/name: web
    app.kubernetes.io/component: app
type: Opaque
stringData:
  # FAKE — replace via an out-of-band mechanism in any real environment.
  API_TOKEN: "FAKE-do-not-use-0000000000000000"
  DB_PASSWORD: "FAKE-change-me-not-a-real-password"
