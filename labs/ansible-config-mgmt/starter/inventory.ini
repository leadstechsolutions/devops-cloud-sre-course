# Static inventory for the lab. Replace the ansible_host IPs with your own EC2
# instances (or local VMs / containers) before running against real machines.
#
# Groups:
#   web  -> application/web tier (gets baseline + hardening + cloudwatch_agent)
#   db   -> database tier        (gets baseline + hardening + cloudwatch_agent)
#
# 'all' children rollup is defined below so site.yml can target either tier or all.

[web]
web1 ansible_host=10.0.1.11
web2 ansible_host=10.0.1.12

[db]
db1 ansible_host=10.0.2.21

# Per-group connection settings. The app user we create lives in baseline;
# the bootstrap user below is the cloud-init default used for the FIRST run.
[web:vars]
node_role=web

[db:vars]
node_role=db

# Variables shared by every managed host.
[all:vars]
ansible_user=ubuntu
ansible_python_interpreter=/usr/bin/python3
ansible_ssh_private_key_file=~/.ssh/lab_ed25519
# Connect over SSH (default). Set to 'local' only for a localhost dry-run.
ansible_connection=ssh
