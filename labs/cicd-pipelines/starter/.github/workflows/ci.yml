name: ci

# PRIMARY Week 9 pipeline. The lint -> test -> build half is done for you so you
# can see a green run quickly; YOUR job is to add the security GATE (gitleaks +
# pip-audit) that FAILS the build on a finding. See the TODO at the bottom.
on:
  push:
    branches: [main]
  pull_request:

# Least privilege: read-only repo access by default.
permissions:
  contents: read

# Cancel superseded runs on the same ref so a force-push doesn't burn minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Unit tests (pytest)
        run: pytest -q

      - name: Build artifact
        run: |
          mkdir -p dist
          # Real, reproducible artifact: a source tarball tagged with the commit
          # SHA for traceability (you publish this in Class 2).
          tar -czf "dist/app-${GITHUB_SHA::7}.tar.gz" app requirements.txt
          ls -la dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-build-${{ matrix.python-version }}
          path: dist/*.tar.gz
          retention-days: 7

  # TODO(student): Add the `security` job below — this is the headline task.
  # It is a SEPARATE job (so a code failure and a security finding are distinct
  # in the run summary). Requirements (see README "How the scan gate blocks a
  # merge"):
  #   1. runs-on: ubuntu-latest  and  permissions: contents: read
  #   2. Checkout with `fetch-depth: 0` — gitleaks scans the FULL git history.
  #   3. Secret scan: gitleaks/gitleaks-action@v2 with
  #        env:
  #          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  #      gitleaks EXITS NON-ZERO on a committed credential -> the job fails.
  #   4. Set up Python (actions/setup-python@v5, "3.12").
  #   5. SCA: run `pip install pip-audit==2.7.3` then `pip-audit -r requirements.txt`.
  #      pip-audit EXITS NON-ZERO on a dependency CVE -> the job fails.
  #   Do NOT add `continue-on-error: true` or `|| true` — that turns the gate
  #   into a soft warning and a leaked secret / vulnerable dep would merge.
  # When done, `python3 tests/check_job_graph.py <your ci.yml>` is green and the
  # TestCiSecurityGate tests in tests/test_workflows.py pass against your file.
