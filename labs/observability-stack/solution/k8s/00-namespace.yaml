# Dedicated namespace for the whole stack. Created first so everything else
# lands inside it. The Pod Security Admission labels enforce the `restricted`
# profile, which is why both the app and Prometheus run as non-root with a
# locked-down securityContext (see the Deployments).
apiVersion: v1
kind: Namespace
metadata:
  name: lab-obs
  labels:
    app.kubernetes.io/part-of: observability-stack
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/warn: restricted
